<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- R vertical stem -->
  <path d="M20 48V16" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- R bowl (top curve) -->
  <path d="M20 16h10c5.5 0 10 4 10 9s-4.5 9-10 9H20" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- R leg transitioning into spanner -->
  <path d="M30 34l8 8" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Spanner head (open-end wrench jaw) -->
  <circle cx="42" cy="46" r="5" stroke="white" stroke-width="3.5" fill="none"/>
  <path d="M38.5 42.5l-1.5-1.5" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
</svg>
